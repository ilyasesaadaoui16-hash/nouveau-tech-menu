<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOUVEAU TECH | القائمة التفاعلية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #fff; overflow-x: hidden; }
        
        /* 1. الخلفية التفاعلية */
        .interactive-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
        }
        .bg-orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            animation: orbFloat 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #d4af37; top: -10%; left: -10%; }
        .orb-2 { width: 300px; height: 300px; background: #3b82f6; bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: #ec4899; top: 40%; left: 60%; animation-delay: -10s; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 40px) scale(1.1); } }

        /* 2. شاشة الترحيب والملصقات */
        #splash { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s, visibility 0.6s; }
        .splash-hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .welcome-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(90deg, #d4af37, #b8962e); color: #fff; padding: 10px 20px; border-radius: 50px;
            font-weight: bold; box-shadow: 0 10px 25px rgba(212,175,55,0.4); z-index: 100; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-show { transform: translateX(-50%) translateY(0); }
        
        .badge {
            position: absolute; top: 12px; right: 12px; padding: 4px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: bold; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: badgePop 0.5s ease-out;
        }
        .badge-new { background: #10b981; } .badge-hot { background: #ef4444; } .badge-offer { background: #8b5cf6; }
        @keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

        /* 3. كروت المنيو */
        .menu-card {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; cursor: pointer;
        }
        .menu-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.08); border-color: #d4af37; box-shadow: 0 20px 40px rgba(212,175,55,0.15); }
        .menu-card img { width: 100%; height: 160px; object-fit: cover; transition: transform 0.5s; }
        .menu-card:hover img { transform: scale(1.05); }

        /* 4. عارض الصور (Lightbox) */
        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none;
            justify-content: center; align-items: center; flex-direction: column; opacity: 0; transition: opacity 0.3s;
        }
        #lightbox.active { display: flex; opacity: 1; }
        .lb-img-container { position: relative; max-width: 90vw; max-height: 75vh; overflow: hidden; border-radius: 16px; cursor: grab; }
        .lb-img-container:active { cursor: grabbing; }
        .lb-img { max-width: 100%; max-height: 70vh; object-fit: contain; transition: transform 0.2s ease-out; transform-origin: center; }
        .lb-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; backdrop-filter: blur(10px); }
        .lb-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .lb-btn:hover { background: #d4af37; }
        .lb-close { position: absolute; top: 20px; right: 20px; font-size: 2rem; cursor: pointer; color: white; opacity: 0.7; transition: 0.2s; }
        .lb-close:hover { opacity: 1; transform: rotate(90deg); }
        .zoom-hint { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- الخلفية التفاعلية -->
    <div class="interactive-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <canvas id="particles" class="absolute inset-0 w-full h-full"></canvas>
    </div>

    <!-- شاشة الترحيب -->
    <div id="splash">
        <img src="logo.png" class="w-28 h-28 mb-4 animate-bounce object-contain" alt="Logo">
        <h1 class="text-3xl font-black text-yellow-500 tracking-wider mb-2">NOUVEAU TECH</h1>
        <div class="flex gap-2 text-gray-400 text-sm">
            <span>☕</span><span>🥐</span><span>✨</span><span>🚀</span>
        </div>
    </div>

    <!-- إشعار الترحيب -->
    <div id="toast" class="welcome-toast">🎉 أهلاً بك! استمتع بتجربة ذواقة فريدة</div>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/5 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" class="w-10 h-10 object-contain" alt="Logo">
                <div>
                    <h1 class="font-bold text-lg leading-tight">NOUVEAU TECH</h1>
                    <p class="text-[10px] text-yellow-500">مقهى عصري | وجدة</p>
                </div>
            </div>
            <div class="bg-yellow-500/20 text-yellow-400 text-xs px-3 py-1 rounded-full border border-yellow-500/30">
                <span id="typing-text">أجواء تقنية...</span>
            </div>
        </div>
        <div class="flex overflow-x-auto gap-3 px-4 pb-3 no-scrollbar" id="categories">
            <button class="bg-yellow-500 text-black px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap shadow-lg shadow-yellow-500/20">🔥 الكل</button>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-md mx-auto p-4 pb-24">
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div class="col-span-full text-center py-20 text-gray-500">جاري تحضير القائمة...</div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox">
        <div class="lb-close" onclick="closeLightbox()">✕</div>
        <div class="lb-img-container" id="lb-container">
            <img id="lb-img" class="lb-img" src="" alt="">
        </div>
        <div class="lb-controls">
            <button class="lb-btn" onclick="zoomImage(0.2)">+</button>
            <button class="lb-btn" onclick="zoomImage(-0.2)">−</button>
            <button class="lb-btn" onclick="resetZoom()">↺</button>
        </div>
        <p class="zoom-hint mt-2">مرر للإغلاق • عجلة الماوس للتكبير • اسحب للتحريك</p>
    </div>

    <script>
        // 1. إخفاء Splash وإظهار Toast
        setTimeout(() => {
            document.getElementById('splash').classList.add('splash-hide');
            setTimeout(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('toast-show');
                setTimeout(() => toast.classList.remove('toast-show'), 3500);
            }, 300);
        }, 2500);

        // 2. جزيئات الخلفية التفاعلية
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        class Particle {
            constructor() { this.x = Math.random() * width; this.y = Math.random() * height; this.size = Math.random() * 2; this.speedX = (Math.random() - 0.5) * 0.5; this.speedY = (Math.random() - 0.5) * 0.5; }
            update() { this.x += this.speedX; this.y += this.speedY; if(this.x < 0 || this.x > width) this.speedX *= -1; if(this.y < 0 || this.y > height) this.speedY *= -1; }
            draw() { ctx.fillStyle = 'rgba(212, 175, 55, 0.5)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<50; i++) particles.push(new Particle());
        function animateParticles() { ctx.clearRect(0,0,width,height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();

        // 3. تأثير الكتابة المتغير
        const phrases = ["☕ قهوة مختصة", "🥐 فطور فاخر", "✨ أجواء تقنية", "🚀 تجربة عصرية"];
        let pIdx = 0;
        setInterval(() => {
            const el = document.getElementById('typing-text');
            el.style.opacity = 0;
            setTimeout(() => { pIdx = (pIdx + 1) % phrases.length; el.innerText = phrases[pIdx]; el.style.opacity = 1; }, 300);
        }, 3000);

        // 4. تحميل البيانات والعرض
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIWHuGH6ncA4zp6A43RdxyxM3yibzV65Lpq4hdgc6NhVv4yjZfRpNfUFJMRbr6cP56Ds7oD9lye1B3/pub?output=tsv'; 
        let allItems = [];
        const badges = ['badge-new', 'badge-hot', 'badge-offer'];
        const badgeTexts = ['✨ جديد', '🔥 الأكثر طلباً', '💎 عرض خاص'];

        function init() {
            Papa.parse(SHEET_URL, { download: true, header: true, complete: r => {
                allItems = r.data.filter(i => i.name);
                renderCats();
                renderMenu('all');
            }});
        }

        function renderCats() {
            const cats = [...new Set(allItems.map(i => i.category))];
            const cont = document.getElementById('categories');
            cont.innerHTML = `<button onclick="renderMenu('all')" class="bg-yellow-500 text-black px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap shadow-lg">🔥 الكل</button>` +
                cats.map(c => `<button onclick="renderMenu('${c}')" class="bg-white/10 text-white px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap hover:bg-white/20 transition">${c}</button>`).join('');
        }

        function renderMenu(cat) {
            const filtered = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = filtered.map((item, i) => {
                const badgeClass = (i % 3 === 0) ? badges[0] : (i % 3 === 1) ? badges[1] : badges[2];
                const badgeTxt = (i % 3 === 0) ? badgeTexts[0] : (i % 3 === 1) ? badgeTexts[1] : badgeTexts[2];
                const showBadge = item.category.includes('قهوة') || item.category.includes('فطور');
                
                return `
                <div class="menu-card animate-[fadeInUp_0.6s_ease-out_${i*0.1}s_both]" onclick="openLightbox('${item.image || 'https://via.placeholder.com/400'}')">
                    <div class="relative">
                        <img src="${item.image || 'https://via.placeholder.com/400?text=NOUVEAU+TECH'}" alt="${item.name}">
                        ${showBadge ? `<span class="badge ${badgeClass}">${badgeTxt}</span>` : ''}
                        <div class="absolute bottom-3 left-3 bg-black/70 backdrop-blur-md px-3 py-1 rounded-lg text-yellow-400 font-bold text-sm border border-yellow-500/30">
                            ${item.price}
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg mb-1">${item.name}</h3>
                        <p class="text-xs text-gray-400 leading-relaxed line-clamp-2">${item.desc || ''}</p>
                        ${item.extra && item.extra !== '-' ? `<p class="text-[10px] text-yellow-500 mt-2 font-medium">⚡ ${item.extra}</p>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // 5. منطق الـ Lightbox والـ Zoom
        let scale = 1, panning = false, pointX = 0, pointY = 0, startX = 0, startY = 0;
        const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lb-img'), lbCont = document.getElementById('lb-container');

        function openLightbox(src) {
            lbImg.src = src; scale = 1; pointX = pointY = 0; updateTransform();
            lb.classList.add('active');
        }
        function closeLightbox() { lb.classList.remove('active'); }
        lb.addEventListener('click', e => { if(e.target === lb) closeLightbox(); });

        function zoomImage(delta) { scale = Math.max(1, Math.min(5, scale + delta)); updateTransform(); }
        function resetZoom() { scale = 1; pointX = pointY = 0; updateTransform(); }
        function updateTransform() { lbImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }

        // عجلة الماوس
        lbCont.addEventListener('wheel', e => { e.preventDefault(); zoomImage(e.deltaY > 0 ? -0.2 : 0.2); }, { passive: false });
        
        // السحب للتحريك
        lbCont.addEventListener('mousedown', e => { panning = true; startX = e.clientX - pointX; startY = e.clientY - pointY; });
        window.addEventListener('mouseup', () => panning = false);
        window.addEventListener('mousemove', e => { if(!panning || scale === 1) return; pointX = e.clientX - startX; pointY = e.clientY - startY; updateTransform(); });

        // دعم اللمس للموبايل
        let touchStartDist = 0, touchStartScale = 1;
        lbCont.addEventListener('touchstart', e => {
            if(e.touches.length === 2) {
                touchStartDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                touchStartScale = scale;
            }
        });
        lbCont.addEventListener('touchmove', e => {
            if(e.touches.length === 2) {
                e.preventDefault();
                const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                scale = Math.max(1, Math.min(5, touchStartScale + (dist - touchStartDist) * 0.01));
                updateTransform();
            }
        }, { passive: false });

        window.onload = init;
    </script>
</body>
</html>
