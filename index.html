<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOUVEAU TECH | القائمة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #fdfbf7; /* لون كريمي فاخر */
            overflow-x: hidden;
        }
        
        /* 1. شاشة الترحيب (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out;
        }
        .splash-logo {
            animation: pulseZoom 2s infinite;
        }
        .splash-text {
            color: #d4af37;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 2px;
            animation: slideUp 1s ease-out;
        }

        /* 2. الخلفية المتحركة (Floating Elements) */
        .floating-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.4;
        }
        .float-item {
            position: absolute;
            font-size: 2rem;
            animation: floatUp 10s linear infinite;
        }

        /* 3. كروت المنيو السحرية */
        .magic-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .magic-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 30px rgba(212, 175, 55, 0.2);
        }
        .magic-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
        }
        .gold-btn {
            background: linear-gradient(45deg, #d4af37, #b8962e);
            color: white;
            border: none;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.4);
        }

        /* Animations Keyframes */
        @keyframes pulseZoom {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px #d4af37; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }
        @keyframes fadeInItem {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 1. شاشة الترحيب (تظهر أولاً) -->
    <div id="splash-screen">
        <img src="logo.png" class="w-32 h-32 mb-4 splash-logo object-contain" alt="Logo">
        <div class="splash-text">NOUVEAU TECH</div>
        <div class="text-gray-400 mt-2 text-sm animate-pulse">جارِ تحضير مذاقك...</div>
    </div>

    <!-- 2. الخلفية المتحركة -->
    <div class="floating-bg" id="floating-bg">
        <!-- سيتم ملؤها بواسطة JS -->
    </div>

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-yellow-100 shadow-sm">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="logo.png" class="w-10 h-10 object-contain" alt="Logo">
                <h1 class="font-black text-xl text-gray-800">NOUVEAU TECH</h1>
            </div>
            <div class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                ✨ <span id="typing-text">أجواء تقنية</span>
            </div>
        </div>
        
        <!-- Categories -->
        <div class="flex overflow-x-auto gap-3 px-4 pb-3 no-scrollbar" id="categories">
            <button class="gold-btn px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">🔥 الكل</button>
        </div>
    </header>

    <!-- Main Menu -->
    <main class="max-w-md mx-auto p-4 pb-24">
        <div id="menu-grid" class="grid grid-cols-2 gap-4">
            <!-- العناصر -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 py-2 text-center z-40 text-xs text-gray-400">
        Made with ❤️ by Nouveau Tech
    </footer>

    <script>
        // 1. إخفاء شاشة الترحيب بعد 3 ثوانٍ
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 3000);

        // 2. إنشاء الخلفية المتحركة
        const emojis = ['☕', '🥐', '🍰', '🥤', '', '✨'];
        const container = document.getElementById('floating-bg');
        for(let i=0; i<15; i++) {
            const el = document.createElement('div');
            el.classList.add('float-item');
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = (Math.random() * 5 + 8) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.fontSize = (Math.random() * 20 + 20) + 'px';
            container.appendChild(el);
        }

        // 3. تأثير الكتابة المتغير في الهيدر
        const texts = ["أشهى القهوة ☕", "ألذ الفطور 🥐", "تجربة عصرية ✨", "NOUVEAU TECH 🚀"];
        let textIndex = 0;
        setInterval(() => {
            const el = document.getElementById('typing-text');
            el.style.opacity = 0;
            setTimeout(() => {
                textIndex = (textIndex + 1) % texts.length;
                el.innerText = texts[textIndex];
                el.style.opacity = 1;
            }, 300);
        }, 3000);

        // 4. تحميل البيانات من Google Sheets
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIWHuGH6ncA4zp6A43RdxyxM3yibzV65Lpq4hdgc6NhVv4yjZfRpNfUFJMRbr6cP56Ds7oD9lye1B3/pub?output=tsv';
        
        function init() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const items = results.data.filter(i => i.name);
                    renderMenu(items, 'all');
                    renderCategories(items);
                }
            });
        }

        function renderCategories(items) {
            const cats = [...new Set(items.map(i => i.category))];
            const cont = document.getElementById('categories');
            cont.innerHTML = `<button onclick="renderMenu(allItems, 'all')" class="gold-btn px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap">🔥 الكل</button>` +
                cats.map(c => `<button onclick="renderMenu(allItems, '${c}')" class="bg-white border border-gray-200 px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap text-gray-600 hover:bg-yellow-50">${c}</button>`).join('');
        }

        let allItems = [];

        function renderMenu(items, cat) {
            allItems = items;
            const filtered = cat === 'all' ? items : items.filter(i => i.category === cat);
            const grid = document.getElementById('menu-grid');
            
            // تأثير الظهور المتتابع
            grid.innerHTML = filtered.map((item, index) => `
                <div class="magic-card" style="animation: fadeInItem 0.5s ease-out ${index * 0.1}s backwards;">
                    <div class="relative">
                        <img src="${item.image || 'https://via.placeholder.com/200?text=Food'}" alt="${item.name}">
                        ${item.category.includes('قهوة') ? '<div class="absolute top-2 left-2 text-lg animate-bounce">☕</div>' : ''}
                        <div class="absolute bottom-2 right-2 bg-white/90 px-2 py-1 rounded-lg text-xs font-bold text-yellow-700 shadow-sm">
                            ${item.price}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm mb-1">${item.name}</h3>
                        <p class="text-[10px] text-gray-500 line-clamp-2">${item.desc || ''}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
