<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOUVEAU TECH | القائمة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        /* الأساسيات */
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #fff; overflow-x: hidden; padding-bottom: 80px; }
        
        /* الخلفية المتحركة */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; z-index: -1; animation: float 10s infinite alternate; }
        .orb-1 { width: 300px; height: 300px; background: #d4af37; top: -50px; left: -50px; }
        .orb-2 { width: 250px; height: 250px; background: #3b82f6; bottom: -50px; right: -50px; animation-delay: -3s; }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(20px, 40px); } }

        /* شاشة الترحيب */
        #splash { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        .splash-hide { opacity: 0; pointer-events: none; }
        
        /* كروت المنيو */
        .menu-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; transition: 0.3s; position: relative; }
        .menu-card:active { transform: scale(0.97); }
        .badge { position: absolute; top: 10px; right: 10px; background: #d4af37; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; }

        /* السلة العائمة */
        .cart-fab { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 12px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(212,175,55,0.4); z-index: 100; display: flex; align-items: center; gap: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cart-fab:hover { transform: translateX(-50%) scale(1.05); }
        .badge-count { background: #ef4444; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Modal (السلة والتحقق) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; display: none; justify-content: center; align-items: flex-end; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Lightbox للصورة */
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 300; display: none; justify-content: center; align-items: center; }
        #lightbox.active { display: flex; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <!-- الخلفية -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <!-- شاشة الترحيب -->
    <div id="splash">
        <img src="logo.png" class="w-24 h-24 mb-4 animate-bounce object-contain">
        <h1 class="text-2xl font-bold text-yellow-500">NOUVEAU TECH</h1>
        <p class="text-gray-400 text-sm mt-2">جارِ تحضير القائمة...</p>
    </div>

    <!-- الهيدر -->
    <header class="sticky top-0 z-50 bg-white/5 backdrop-blur-lg border-b border-white/10 px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="logo.png" class="w-8 h-8 object-contain">
                <h1 class="font-bold text-lg">NOUVEAU TECH</h1>
            </div>
            <div class="bg-white/10 px-3 py-1 rounded-full text-xs text-yellow-500 border border-yellow-500/30">
                📍 طاولة: <span id="table-display">...</span>
            </div>
        </div>
        <!-- التصنيفات -->
        <div class="flex overflow-x-auto gap-3 mt-3 pb-1 no-scrollbar" id="categories">
            <button onclick="filterCat('all')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap">الكل</button>
        </div>
    </header>

    <!-- القائمة -->
    <main class="max-w-md mx-auto p-4">
        <div id="menu-grid" class="grid grid-cols-2 gap-4">
            <!-- العناصر -->
        </div>
    </main>

    <!-- زر السلة -->
    <div class="cart-fab" onclick="openCart()">
        🛒 <span id="cart-count" class="badge-count">0</span> <span id="cart-total">0 DH</span>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-yellow-500">🛒 سلة الطلبات</h2>
                <button onclick="closeCart()" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-3 mb-4">
                <!-- عناصر السلة -->
            </div>
            <div class="border-t border-gray-700 pt-4">
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>المجموع:</span>
                    <span class="text-yellow-500" id="modal-total">0 DH</span>
                </div>
                
                <!-- عرض رقم الطاولة (للقراءة فقط) -->
                <div class="bg-yellow-500/10 border border-yellow-500/30 rounded-lg px-4 py-3 mb-4 flex justify-between items-center">
                    <span class="text-sm text-gray-400">📍 رقم الطاولة</span>
                    <span id="table-display-cart" class="font-bold text-yellow-500 text-xl">-</span>
                </div>

                <!-- حقل مخفي يحتوي على رقم الطاولة -->
                <input type="hidden" id="table-input" value="">
                <div class="bg-gray-800 p-3 rounded-lg mb-4">
                    <label class="flex justify-between items-center">
                        <span class="text-sm text-gray-400">👥 عدد الأشخاص (Couvert)</span>
                        <input id="couvert-input" type="number" value="1" min="1" max="20" class="bg-gray-700 text-white w-16 text-center rounded px-2 py-1">
                    </label>
                </div>
                
                <button onclick="submitOrder()" id="send-btn" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl hover:bg-yellow-400 transition">
                    ✅ إرسال الطلب الآن
                </button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <img id="lb-img" src="" class="max-w-[90%] max-h-[80vh] object-contain">
    </div>

    <script>
        // === إعدادات هامة ===
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSIWHuGH6ncA4zp6A43RdxyxM3yibzV65Lpq4hdgc6NhVv4yjZfRpNfUFJMRbr6cP56Ds7oD9lye1B3/pub?output=csv'; 
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8K65yVyThuNGgyrJ8CFal5gAza_qV7j0w4uKrt1Uspo2IG4F5x5-IzW3rFnJJkO-Zhg/exec';

        // === متغيرات النظام ===
        let cart = [];
        let allItems = [];
        
        // قراءة رقم الطاولة من الرابط (?table=5)
        const urlParams = new URLSearchParams(window.location.search);
        let tableNum = urlParams.get('table');

        // إذا لم يوجد رقم في الرابط، اطلبه من الزبون
        if (!tableNum) {
            tableNum = prompt('الرجاء إدخال رقم طاولتك:');
            if (!tableNum || tableNum.trim() === '') {
                alert('لا يمكن إرسال الطلب بدون رقم طاولة!');
                tableNum = '0';
            }
        }

        // عرض رقم الطاولة
        document.getElementById('table-display').innerText = tableNum;
        document.getElementById('table-input').value = tableNum;

        // === 1. إخفاء شاشة الترحيب ===
        setTimeout(() => document.getElementById('splash').classList.add('splash-hide'), 2000);

        // === 2. تحميل البيانات ===
        function init() {
            Papa.parse(SHEET_URL, {
                download: true, header: true,
                complete: function(results) {
                    allItems = results.data.filter(i => i.name);
                    renderMenu('all');
                    renderCategories();
                }
            });
        }

        function renderCategories() {
            const cats = [...new Set(allItems.map(i => i.category))];
            const cont = document.getElementById('categories');
            cont.innerHTML = `<button onclick="filterCat('all')" class="bg-yellow-500 text-black px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap">الكل</button>` +
                cats.map(c => `<button onclick="filterCat('${c}')" class="bg-white/10 text-white px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap hover:bg-white/20">${c}</button>`).join('');
        }

        function filterCat(cat) {
            renderMenu(cat);
            document.querySelectorAll('#categories button').forEach(b => {
                b.classList.remove('bg-yellow-500', 'text-black');
                b.classList.add('bg-white/10', 'text-white');
            });
            event.target.classList.remove('bg-white/10', 'text-white');
            event.target.classList.add('bg-yellow-500', 'text-black');
        }

        function renderMenu(cat) {
            const items = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = items.map((item, i) => `
                <div class="menu-card" onclick="openLightbox('${item.image || 'https://via.placeholder.com/300'}')">
                    <div class="relative">
                        <img src="${item.image || 'https://via.placeholder.com/300'}" class="w-full h-32 object-cover">
                        <span class="badge">🔥 ${i % 3 === 0 ? 'مميز' : (i % 3 === 1 ? 'جديد' : 'شائع')}</span>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-sm mb-1">${item.name}</h3>
                        <p class="text-[10px] text-gray-400 line-clamp-2">${item.desc || ''}</p>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-yellow-500 font-bold text-sm">${item.price}</span>
                            <button onclick="event.stopPropagation(); addToCart('${item.name}', '${item.price}')" class="bg-yellow-500 text-black w-7 h-7 rounded-full flex items-center justify-center font-bold hover:bg-yellow-400">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // === 3. منطق السلة ===
        function addToCart(name, price) {
            const p = parseInt(price);
            const existing = cart.find(i => i.name === name);
            if(existing) existing.qty++;
            else cart.push({ name, price: p, qty: 1 });
            updateCartUI();
            
            // تأثير بصري بسيط
            const fab = document.querySelector('.cart-fab');
            fab.style.transform = "translateX(-50%) scale(1.2)";
            setTimeout(() => fab.style.transform = "translateX(-50%) scale(1)", 200);
        }

        function updateCartUI() {
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total + ' DH';
            document.getElementById('modal-total').innerText = total + ' DH';

            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, idx) => `
                <div class="flex justify-between items-center bg-gray-800 p-2 rounded-lg">
                    <div class="flex-1">
                        <div class="text-sm font-bold">${item.name}</div>
                        <div class="text-xs text-gray-400">${item.price} DH x ${item.qty}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${idx}, -1)" class="w-6 h-6 bg-red-500 rounded text-white text-xs">-</button>
                        <span>${item.qty}</span>
                        <button onclick="changeQty(${idx}, 1)" class="w-6 h-6 bg-green-500 rounded text-white text-xs">+</button>
                    </div>
                </div>
            `).join('');
        }

        function changeQty(idx, delta) {
            cart[idx].qty += delta;
            if(cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
        }

        function openCart() {
            // تحديث عرض رقم الطاولة في السلة
            const tableNum = document.getElementById('table-input').value;
            document.getElementById('table-display-cart').innerText = tableNum || 'غير محدد';
            
            document.getElementById('cart-modal').classList.add('active');
        }
        
        function closeCart() { 
            document.getElementById('cart-modal').classList.remove('active'); 
        }

        // === 4. إرسال الطلب ===
        function getDeviceId() {
            let id = localStorage.getItem('device_id');
            if (!id) { id = Math.random().toString(36).substr(2, 9); localStorage.setItem('device_id', id); }
            return id;
        }

        function submitOrder() {
            if(cart.length === 0) return alert('السلة فارغة!');
            
            const tableVal = document.getElementById('table-input').value;
            if(!tableVal || tableVal === '0') return alert('رقم الطاولة غير صحيح!');

            // فحص الحماية (Cooldown)
            const lastOrder = localStorage.getItem('last_order_time');
            if(lastOrder && (Date.now() - lastOrder < 60000)) return alert('الرجاء الانتظار دقيقة قبل طلب جديد ⏳');

            // إرسال الطلب
            const btn = document.getElementById('send-btn');
            btn.innerText = 'جارِ الإرسال...';
            btn.disabled = true;

            const orderData = {
            const orderData = {
                table: tableVal,
                // إرسال الأصناف مع الأسعار (صيغة جديدة)
                items: cart.map(i => `${i.name} x${i.qty} @${i.price}`).join(', '),
                total: document.getElementById('modal-total').innerText,
                deviceId: getDeviceId(),
                couvert: document.getElementById('couvert-input').value || 1
            };
        
            console.log('Sending couvert:', orderData.couvert); // للتأكد من القيمة
           
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            }).then(() => {
                alert('✅ تم استلام طلبك بنجاح! شكراً لك.');
                localStorage.setItem('last_order_time', Date.now());
                cart = [];
                updateCartUI();
                closeCart();
                btn.innerText = '✅ إرسال الطلب الآن';
                btn.disabled = false;
            }).catch(() => alert('حدث خطأ في الاتصال'));
        }

        // === 5. Lightbox ===
        function openLightbox(src) {
            document.getElementById('lb-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        window.onload = init;
    </script>
</body>
</html>
